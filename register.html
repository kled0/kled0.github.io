<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-register">
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <span class="logo-icon">✦</span>
                    <span class="logo-text">CosmoTutor</span>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Главная</a></li>
                    <li><a href="login.html" class="nav-link">Вход</a></li>
                    
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <div class="stars-container"></div>

    <div class="form-container form-container-wide">
        <h2>Создать аккаунт</h2>
        <p class="form-subtitle">Начните путешествие по Вселенной с персональными занятиями</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullname">Полное имя</label>
                <input type="text" id="fullname" placeholder="Иван Иванов" required>
            </div>

            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="youremail.com" required>
            </div>

            <div class="form-group">
                <label for="reg-password">Пароль</label>
                <input type="password" id="reg-password" placeholder="Минимум 6 символов" required>
                <small class="password-hint">Минимум 6 символов, рекомендуется использовать буквы и цифры</small>
            </div>

            <div class="form-group">
                <label for="confirm-password">Подтверждение пароля</label>
                <input type="password" id="confirm-password" placeholder="Повторите пароль" required>
            </div>

            <div class="form-row-inline terms-row">
                <label class="checkbox checkbox-terms">
                    <input type="checkbox" required>
                    <span class="terms-text">
                        Я соглашаюсь с
                        <a href="#" class="terms-link">условиями использования</a> и
                        <a href="#" class="terms-link">политикой конфиденциальности</a>
                    </span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>

            <div class="form-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </form>

        <div class="form-social-section">
            <p class="form-social-text">Или зарегистрируйтесь через соцсети</p>
            <button type="button" class="btn btn-secondary btn-full social-btn">Продолжить с Google</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
