<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в личный кабинет CosmoTutor — онлайн-уроки астрономии</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-login">
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <span class="logo-icon">✦</span>
                    <span class="logo-text">CosmoTutor</span>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Главная</a></li>
                    <li><a href="login.html" class="nav-link active">Вход</a></li>
                    
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <div class="stars-container"></div>

    <div class="form-container">
        <h2>Вход в аккаунт</h2>
        <p class="form-subtitle">Продолжите обучение астрономии в личном кабинете</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="youremail.com" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Ваш пароль" required>
            </div>

            <div class="form-row-inline login-options">
                <label class="checkbox checkbox-remember">
                    <input type="checkbox">
                    <span>Запомнить меня</span>
                </label>
                <a href="#" class="link-forgot">Забыли пароль?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Войти</button>

            <div class="form-link">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </div>
        </form>

        <div class="form-social-section">
            <p class="form-social-text">Или войдите через соцсети</p>
            <button type="button" class="btn btn-secondary btn-full social-btn">Войти через Google</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
